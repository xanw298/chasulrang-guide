<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차슐랭 가이드</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #b80f2e;
      color: white;
    }

    .hero {
      min-height: 100vh;
      padding: 50px 24px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .bg-number {
      position: absolute;
      font-size: 420px;
      font-weight: 900;
      color: rgba(80,0,20,0.16);
      z-index: 0;
    }

    .num-1 { top: 20px; left: -40px; }
    .num-2 { bottom: -40px; right: -30px; }

    .content {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
    }

    .small-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 12px;
    }

    .main-title {
      font-size: clamp(64px, 13vw, 150px);
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
    }

    .guide {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 16px;
      margin-top: 10px;
    }

    .subtitle {
      margin-top: 40px;
      color: #ff9b6b;
      font-size: clamp(26px, 5vw, 54px);
      font-weight: 800;
    }

    .section {
      background: #fff;
      color: #111;
      padding: 48px 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h2 {
      font-size: 28px;
      border-left: 8px solid #b80f2e;
      padding-left: 14px;
    }

    .rating-box {
      background: #b80f2e;
      padding: 30px;
      border-radius: 24px;
      margin-bottom: 40px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .rating-row:last-child { border-bottom: none; }

    .stars {
      min-width: 110px;
      font-size: 28px;
      letter-spacing: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .selected {
      font-weight: 900;
      font-size: 22px;
      min-width: 110px;
    }

    .grade-title {
      margin-top: 30px;
      font-size: 20px;
      font-weight: 900;
      color: #b80f2e;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    .card {
      text-decoration: none;
      color: inherit;
      background: #fafafa;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 900;
    }

    .team-section {
      display: grid;
      gap: 18px;
    }

    .team-card {
      background: #fafafa;
      padding: 20px;
      border-radius: 20px;
    }

    .team-title {
      font-weight: 900;
      color: #b80f2e;
    }

    .members {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .members span {
      background: #111;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
    }

    footer {
      background: #111;
      text-align: center;
      padding: 20px;
      font-weight: 800;
    }

    @media (max-width: 600px) {
      .small-title { font-size: 24px; }
      .guide { font-size: 28px; }
      .bg-number { font-size: 260px; }
    }

  </style>
</head>

<body>

<section class="hero">
  <div class="bg-number num-1">20</div>
  <div class="bg-number num-2">25</div>

  <div class="content">
    <div class="small-title">THE</div>
    <h1 class="main-title">CXANW</h1>
    <div class="guide">GUIDE</div>
    <div class="subtitle">SOUTH KOREA</div>
  </div>
</section>

<section class="section">
<div class="container">

<div class="rating-box">
  <div class="rating-row">
    <div class="stars">✿✿✿</div>
    <div>모든 것이 완벽한 식당</div>
  </div>

  <div class="rating-row">
    <div class="stars">✿✿</div>
    <div>요리가 완벽한 식당</div>
  </div>

  <div class="rating-row">
    <div class="stars">✿</div>
    <div>요리가 훌륭하여 추천할 만한 식당</div>

  <div class="rating-row">
    <div class="selected">SELECTED</div>
    <div>특정 메뉴가 훌륭한 식당</div>
  </div>
</div>

<h2>맛집 리스트</h2>

<h3 class="grade-title">✿✿✿ 3스타</h3>
<div class="restaurant-grid"></div>

<h3 class="grade-title">✿✿ 2스타</h3>
<div class="restaurant-grid">
  <a href="https://naver.me/GUwSpBc6" target="_blank" class="card">
    <img src="food1.jpg" class="card-img">
    <div class="card-title">신라제면</div>
  </a>
</div>

<h3 class="grade-title">✿ 1스타</h3>
<div class="restaurant-grid">
  <a href="https://naver.me/53le0FsZ" target="_blank" class="card">
    <img src="food2.jpg" class="card-img">
    <div class="card-title">원동미나리삼겹살</div>
  </a>

  <a href="https://naver.me/xKERsHkW" target="_blank" class="card">
    <img src="food3.jpg" class="card-img">
    <div class="card-title">봄내</div>
  </a>

  <a href="https://naver.me/5JpU3XUX" target="_blank" class="card">
    <img src="food4.jpg" class="card-img">
    <div class="card-title">전포양옥</div>
  </a>

  <a href="https://naver.me/G1wSjUy9" target="_blank" class="card">

  </a>

  <a href="https://naver.me/xeAf9Kf1" target="_blank" class="card">
    <img src="food6.jpg" class="card-img">
    <div class="card-title">슌사이쿠보</div>
  </a>
</div>

<h3 class="grade-title">SELECTED</h3>
<div class="restaurant-grid">
  <a href="https://naver.me/GtJ8weJN" target="_blank" class="card">
    <img src="food7.jpg" class="card-img">
    <div class="card-title">인싸PC</div>
  </a>
</div>

</div>
</section>

<footer>
CXANW GUIDE
</footer>

</body>
</html>
